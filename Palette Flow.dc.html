<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Newsreader:opsz,wght@6..72,400;6..72,500;6..72,600&display=swap" rel="stylesheet">
  <style>*{box-sizing:border-box}html,body{margin:0;padding:0}body{background:#e7e3db}</style>
</helmet>
<div style="min-height:100vh;display:flex;flex-direction:column;background:#e7e3db;font-family:'Inter',system-ui,sans-serif;color:#1c1917;">

  <header style="position:sticky;top:0;z-index:20;display:flex;align-items:center;justify-content:space-between;gap:16px;padding:14px 24px;background:rgba(231,227,219,.9);backdrop-filter:blur(8px);border-bottom:1px solid #d8d2c6;flex-wrap:wrap;">
    <div style="display:flex;align-items:baseline;gap:10px;">
      <span style="font-family:'Newsreader',serif;font-size:19px;font-weight:600;letter-spacing:-.015em;">Palette</span>
      <span style="font-size:11px;color:#857c70;letter-spacing:.1em;text-transform:uppercase;">Flow &amp; states</span>
    </div>
    <div style="display:flex;align-items:center;gap:12px;">
      <div style="display:flex;background:#fff;border:1px solid #d8d2c6;border-radius:999px;padding:3px;gap:2px;">
        <button onClick="{{ showOverview }}" style="{{ tabOverview }}">Overview</button>
        <button onClick="{{ showProto }}" style="{{ tabProto }}">Click-through</button>
      </div>
    </div>
  </header>

  <!-- OVERVIEW: all states as labeled frames -->
  <sc-if value="{{ isOverview }}" hint-placeholder-val="{{ true }}">
    <div style="width:max-content;min-width:100%;box-sizing:border-box;padding:40px;">
      <div style="display:flex;gap:40px;align-items:flex-start;">
        <sc-for list="{{ frames }}" as="f" hint-placeholder-count="5">
          <div style="flex:none;display:flex;flex-direction:column;gap:12px;">
            <div style="display:flex;align-items:baseline;gap:8px;">
              <span style="font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:600;color:#5b5347;">{{ f.label }}</span>
              <span style="font-size:11px;color:#9a8f7e;">{{ f.note }}</span>
            </div>
            <div style="{{ f.cardStyle }}">
              <dc-import name="Palette Screen" screen="{{ f.screen }}" hint-size="100%,520px" style="display:block;width:100%;height:100%;"></dc-import>
            </div>
          </div>
        </sc-for>
      </div>
    </div>
  </sc-if>

  <!-- CLICK-THROUGH: one live screen, navigable -->
  <sc-if value="{{ isProto }}" hint-placeholder-val="{{ false }}">
    <div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:16px;padding:40px 24px 56px;">
      <div style="display:flex;align-items:center;gap:10px;font-size:12.5px;color:#6b6356;">
        <span style="font-family:'JetBrains Mono',monospace;background:#fff;border:1px solid #d8d2c6;border-radius:6px;padding:3px 9px;">{{ stepLabel }}</span>
        <span>Click the dropzone or a sample to advance · "New image" to reset</span>
      </div>
      <div style="width:100%;max-width:880px;background:#fff;border:1px solid #d8d2c6;border-radius:14px;overflow:hidden;box-shadow:0 12px 40px rgba(0,0,0,.12);">
        <div style="display:flex;align-items:center;gap:7px;padding:11px 14px;background:#f4efe7;border-bottom:1px solid #e4ddd0;">
          <span style="width:11px;height:11px;border-radius:50%;background:#e6a08a;"></span>
          <span style="width:11px;height:11px;border-radius:50%;background:#e6cf8a;"></span>
          <span style="width:11px;height:11px;border-radius:50%;background:#a9cf9a;"></span>
          <span style="margin-left:10px;font-family:'JetBrains Mono',monospace;font-size:11.5px;color:#9a8f7e;">palette-from-image.app</span>
        </div>
        <div style="height:560px;">
          <dc-import name="Palette Screen" screen="{{ current }}" interactive="{{ yes }}" onNav="{{ onNav }}" hint-size="100%,560px" style="display:block;width:100%;height:100%;"></dc-import>
        </div>
      </div>
    </div>
  </sc-if>

</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:&quot;100%&quot;,&quot;height&quot;:820}}">
class Component extends DCLogic {
  state = { mode:'overview', current:'empty' };

  tab(active){
    return { padding:'7px 15px', border:'none', borderRadius:'999px', cursor:'pointer', fontSize:'13px', fontWeight:600, fontFamily:'inherit',
      background: active ? '#1c1917' : 'transparent',
      color: active ? '#fff' : '#857c70' };
  }

  onNav(action){
    if(action==='upload'){
      this.setState({current:'loading'});
      clearTimeout(this._t);
      this._t=setTimeout(()=>this.setState({current:'result'}), 950);
    } else if(action==='reset'){
      clearTimeout(this._t);
      this.setState({current:'empty'});
    } else if(action==='error'){
      this.setState({current:'error'});
    }
  }

  renderVals(){
    const m=this.state.mode;
    const stepNames={empty:'1 / Empty',loading:'2 / Loading',result:'3 / Result',error:'Error'};
    return {
      isOverview: m==='overview',
      isProto: m==='proto',
      tabOverview: this.tab(m==='overview'),
      tabProto: this.tab(m==='proto'),
      showOverview:()=>this.setState({mode:'overview'}),
      showProto:()=>this.setState({mode:'proto'}),
      current: this.state.current,
      stepLabel: stepNames[this.state.current] || this.state.current,
      yes: true,
      onNav:(a)=>this.onNav(a),
      frames:[
        { label:'01', note:'Empty / Home',   screen:'empty',   cardStyle:{ width:'860px', height:'560px', background:'#fff', borderRadius:'4px', overflow:'hidden', boxShadow:'0 1px 3px rgba(0,0,0,.1)', border:'1px solid #d8d2c6' } },
        { label:'02', note:'Loading',        screen:'loading', cardStyle:{ width:'860px', height:'560px', background:'#fff', borderRadius:'4px', overflow:'hidden', boxShadow:'0 1px 3px rgba(0,0,0,.1)', border:'1px solid #d8d2c6' } },
        { label:'03', note:'Result + Export',screen:'result',  cardStyle:{ width:'860px', height:'560px', background:'#fff', borderRadius:'4px', overflow:'hidden', boxShadow:'0 1px 3px rgba(0,0,0,.1)', border:'1px solid #d8d2c6' } },
        { label:'04', note:'Error',          screen:'error',   cardStyle:{ width:'860px', height:'560px', background:'#fff', borderRadius:'4px', overflow:'hidden', boxShadow:'0 1px 3px rgba(0,0,0,.1)', border:'1px solid #d8d2c6' } },
        { label:'05', note:'Mobile · 390px', screen:'result',  cardStyle:{ width:'360px', height:'720px', background:'#fff', borderRadius:'4px', overflow:'hidden', boxShadow:'0 1px 3px rgba(0,0,0,.1)', border:'1px solid #d8d2c6' } },
      ],
    };
  }
}
</script>
</body>
</html>
